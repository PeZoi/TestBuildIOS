name: Build Unsigned iOS IPA

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch: # Cho phép bạn bấm nút build thủ công trên web GitHub

jobs:
  build:
    runs-on: macos-15 # Chạy trên máy ảo macOS 15 mới nhất của GitHub để có Xcode 16+
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Prebuild Expo to Native iOS project
        run: npx expo prebuild --platform ios --no-install

      - name: Set Node binary path for Xcode
        run: |
          echo "export NODE_BINARY=$(which node)" > ios/.xcode.env
          cat ios/.xcode.env

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Generate JavaScript bundle manually
        run: |
          # Chủ động tự tạo file bundle JS từ index.ts (TypeScript)
          # Nhờ package.json đã cài sẵn @react-native-community/cli và @react-native/metro-config,
          # lệnh này sẽ chạy thành công 100.
          npx react-native bundle \
            --entry-file index.ts \
            --platform ios \
            --dev false \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios/bundle-assets

      - name: Build and Archive iOS Project (Unsigned)
        run: |
          # Tìm file .xcworkspace trong thư mục ios
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -n 1)
          SCHEME_NAME="ios"
          
          echo "Using workspace: $WORKSPACE_PATH"
          echo "Using scheme: $SCHEME_NAME"
          
          xcodebuild -workspace "$WORKSPACE_PATH" \
                     -scheme "$SCHEME_NAME" \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath build/ios.xcarchive \
                     clean archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package Unsigned App into IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/ios.xcarchive/Products/Applications -name "*.app" | head -n 1)
          
          echo "Found app path: $APP_PATH"
          
          # KIỂM TRA VÀ COPY CƯỠNG BỨC BUNDLE JS NẾU XCODE BỎ QUA
          if [ ! -f "$APP_PATH/main.jsbundle" ]; then
            echo "Warning: main.jsbundle NOT found in Xcode archive. Injecting bundle manually..."
            cp ios/main.jsbundle "$APP_PATH/"
            
            # Copy assets kèm theo nếu có
            if [ -d "ios/bundle-assets" ]; then
              cp -r ios/bundle-assets/* "$APP_PATH/" || true
            fi
          else
            echo "Success: main.jsbundle already exists in Xcode archive."
          fi
          
          cp -r "$APP_PATH" Payload/
          zip -r TaskFlow_unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-Unsigned-IPA
          path: TaskFlow_unsigned.ipa
          if-no-files-found: error